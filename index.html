<script>

function resizeFrame(f){try{var d=f.contentDocument||f.contentWindow.document;if(!d||!d.body)return;
d.body.style.minHeight='0';d.body.style.height='auto';
if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
var h=d.body.scrollHeight;if(h>100){f.style.height=h+'px';f.style.minHeight='0';}}catch(e){}}
function resizeAllFrames(){document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);if(typeof updateProgress==='function')updateProgress();}
function setupFrame(f){var tries=0;function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}else{f.addEventListener('load',tick);}}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
document.addEventListener('click',function(e){var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
var id=h.substring(1);var el=document.getElementById(id);if(!el)return;e.preventDefault();
resizeAllFrames();setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});if(sb)sb.classList.remove('open');},60);},true);

var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){var sh=document.documentElement.scrollHeight-window.innerHeight;
var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
if(rpFill)rpFill.style.width=pct+'%';if(rpPct)rpPct.textContent=Math.round(pct)+'%';
if(backTop){if(window.scrollY>600)backTop.classList.add('show');else backTop.classList.remove('show');}}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
var items=document.querySelectorAll('.sb-item'),chaps=document.querySelectorAll('.chapter');
function highlight(){var idx=-1;chaps.forEach(function(c,i){if(c.getBoundingClientRect().top<window.innerHeight*0.35)idx=i;});
items.forEach(function(it,i){it.classList.toggle('active',i===idx);});}
window.addEventListener('scroll',highlight,{passive:true});highlight();
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
function setHide(on){cap.classList.toggle('hide-near-end',!!on);}

if('IntersectionObserver' in window){var io=new IntersectionObserver(function(es){setHide(es.some(function(e){return e.isIntersecting;}));},{rootMargin:'0px 0px -20px 0px',threshold:0.01});io.observe(t);}
else{window.addEventListener('scroll',function(){var dh=document.documentElement.scrollHeight;var sb2=window.scrollY+window.innerHeight;setHide(dh-sb2<240);},{passive:true});}})();

['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});

if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U'||k==='x'||k==='X')){blk(e);}

/* ── 節層級深連結路由 #chapter-品-章-節（跨 iframe）── */
function _wyGotoDeep(){
  var m=(location.hash||'').match(/^#chapter-(\d+)(?:-(\d+)(?:-(\d+))?)?$/);
  if(!m)return false;
  var P=m[1];var sec=document.getElementById('chapter-'+P);
  if(!sec)return false;
  if(!m[2]){var r=sec.getBoundingClientRect();window.scrollTo({top:window.scrollY+r.top-20,behavior:'smooth'});return true;}
  var deepId='chapter-'+P+'-'+m[2]+(m[3]?'-'+m[3]:'');
  var f=sec.querySelector('iframe.ch-frame');if(!f)return false;
  try{var d=f.contentDocument;if(!d)return false;var el=d.getElementById(deepId);if(!el)return false;
    if(typeof resizeAllFrames==='function')resizeAllFrames();
    var fr=f.getBoundingClientRect();var er=el.getBoundingClientRect();
    window.scrollTo({top:window.scrollY+fr.top+er.top-20,behavior:'smooth'});return true;}catch(e){return false;}
}
window.addEventListener('hashchange',function(){_wyGotoDeep();});
if(/^#chapter-\d+/.test(location.hash||'')){var _dt=0,_div=setInterval(function(){_dt++;if(_wyGotoDeep()||_dt>40)clearInterval(_div);},250);}

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy40dzdl-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
