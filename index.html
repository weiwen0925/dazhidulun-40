<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:76px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-user-drag:none;}
html,body{scrollbar-width:none;-ms-overflow-style:none;
  background:var(--bg);color:var(--text);
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  font-size:20px;line-height:1.85;scroll-behavior:smooth;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
img{-webkit-user-drag:none;pointer-events:none;}

/* Sidebar */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;transition:color .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;padding:0 4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  text-decoration:none;color:var(--sbText);padding:3px 4px;border-radius:6px;
  transition:background .25s,color .25s;cursor:pointer;width:100%;}
.sb-item:hover{background:rgba(184,134,11,.12);color:var(--goldL);}
.sb-circle{width:34px;height:34px;border-radius:50%;background:rgba(184,134,11,.12);
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:15px;font-weight:600;
  border:1px solid rgba(184,134,11,.28);transition:all .25s;}
.sb-item:hover .sb-circle,.sb-item.active .sb-circle{
  background:var(--gold);color:#fff;border-color:var(--gold);
  box-shadow:0 0 14px rgba(184,134,11,.6);}
.sb-item.active .sb-label{color:var(--goldL);}
.sb-label{font-family:"Noto Sans TC",sans-serif;font-size:11.5px;letter-spacing:.5px;
  text-align:center;line-height:1.3;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:120;
  width:40px;height:40px;border:none;border-radius:8px;
  background:rgba(30,26,20,.92);color:var(--gold);font-size:20px;cursor:pointer;}

/* Main */
.main{margin-left:var(--sbW);}
.site-hero{background:linear-gradient(135deg,#1e1a14 0%,#2a2218 50%,#1e1a14 100%);
  color:#f7f3ec;padding:74px 24px 56px;text-align:center;position:relative;overflow:hidden;}
.site-hero::before{content:"卷四十";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-family:"Noto Serif TC",serif;
  font-size:300px;font-weight:900;color:#fff;opacity:.03;letter-spacing:24px;
  pointer-events:none;white-space:nowrap;}
.hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:6px;
  color:var(--goldL);margin-bottom:18px;position:relative;z-index:2;opacity:.85;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:8px;line-height:1.3;
  margin-bottom:14px;position:relative;z-index:2;color:#fff;}
.hero-subtitle{font-size:20px;color:#d4c4a8;letter-spacing:3px;line-height:1.7;
  margin-bottom:10px;position:relative;z-index:2;}
.hero-sub{font-size:18px;color:#c4956a;letter-spacing:1.5px;
  position:relative;z-index:2;line-height:1.8;}
.hero-range{display:inline-block;margin-top:22px;padding:8px 28px;
  border:1px solid rgba(212,168,75,.5);border-radius:30px;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:3px;
  color:var(--goldL);position:relative;z-index:2;}

/* Preface */
.preface{max-width:920px;margin:46px auto 12px;padding:0 26px;}
.preface h2{text-align:center;font-size:30px;font-weight:700;color:var(--accent);
  margin-bottom:24px;letter-spacing:4px;}
.preface h2::before,.preface h2::after{content:"\2756";color:var(--gold);
  margin:0 18px;font-size:18px;vertical-align:middle;opacity:.7;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);
  text-indent:2em;margin-bottom:16px;}
.preface p strong{color:var(--accent-red);font-weight:600;}

/* TOC */
.toc-section{max-width:1100px;margin:36px auto 54px;padding:0 26px;}
.toc-title{text-align:center;font-size:34px;font-weight:700;color:var(--accent);
  margin-bottom:10px;letter-spacing:10px;}
.toc-desc{text-align:center;font-size:17px;color:var(--text-muted);
  margin-bottom:30px;letter-spacing:2px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
.toc-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:18px 22px;display:flex;align-items:center;gap:16px;text-decoration:none;
  color:var(--text);transition:transform .2s,box-shadow .2s,border-color .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.06);}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(91,58,41,.15);
  border-color:var(--gold);}
.toc-num{flex-shrink:0;width:44px;height:44px;border-radius:50%;
  background:var(--headGrad);color:var(--goldL);
  display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:19px;font-weight:700;}
.toc-name{display:flex;flex-direction:column;font-size:19.5px;font-weight:600;
  line-height:1.7;color:var(--accent);}
.toc-name small{font-size:14.5px;font-weight:400;color:var(--text-muted);
  letter-spacing:.5px;margin-top:3px;}

/* Chapter wrappers */
.chapter{margin:0;padding:0;}
.ch-head{background:var(--headGrad);color:#f7f3ec;padding:48px 24px 40px;
  text-align:center;position:relative;}
.ch-head::after{content:"";position:absolute;bottom:18px;left:50%;
  transform:translateX(-50%);width:90px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:4px;
  color:var(--goldL);margin-bottom:14px;opacity:.9;}
.ch-name{font-size:40px;font-weight:900;letter-spacing:4px;color:#fff;line-height:1.35;}
.ch-sub{font-size:17px;color:#c4956a;letter-spacing:1.5px;margin-top:12px;}
.ch-body{max-width:1000px;margin:0 auto;padding:38px 26px 30px;}

/* Bridge */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
  background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
  margin-top:30px;margin-bottom:14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
  font-size:12.5px;background:var(--gold);color:#fff;padding:3px 12px;
  border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-indent:2em;}

/* iframe */
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
  border:1px solid var(--border);border-radius:12px;
  box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin:6px 0 4px;padding:10px 26px;
  font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:2px;
  color:var(--accent);border:1px solid var(--border);border-radius:24px;
  text-decoration:none;transition:all .2s;background:var(--card);}
.next-link:hover{background:var(--gold);color:#fff;border-color:var(--gold);}

/* read progress */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);font-family:"Noto Sans TC",sans-serif;
  font-size:14px;letter-spacing:2px;display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
  transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);
  border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}

/* footer */
.site-footer{background:var(--sbBg);color:var(--sbText);text-align:center;
  padding:40px 24px;margin-top:10px;}
.site-footer p{font-size:15px;line-height:2;letter-spacing:1px;opacity:.85;}
.site-footer .ft-title{font-size:18px;color:var(--goldL);letter-spacing:4px;margin-bottom:10px;}

#backTop{position:fixed;right:24px;bottom:24px;width:44px;height:44px;
  border-radius:50%;border:none;background:var(--headGrad);color:var(--goldL);
  font-size:20px;cursor:pointer;display:none;z-index:110;
  box-shadow:0 4px 14px rgba(0,0,0,.3);}
#backTop.show{display:block;}

@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:40px;}.ch-name{font-size:30px;}
  .ch-body{padding:28px 16px 24px;}
  .toc-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  .hero-title{font-size:32px;letter-spacing:4px;}
  .toc-title{letter-spacing:6px;}
}

// iframe 自動高度
function resizeFrame(f){
  try{
    var d=f.contentDocument||f.contentWindow.document;
    if(!d||!d.body)return;
    d.body.style.minHeight='0';d.body.style.height='auto';
    if(d.documentElement){d.documentElement.style.minHeight='0';
      d.documentElement.style.height='auto';}
    var h=d.body.scrollHeight;
    if(h>100){f.style.height=h+'px';f.style.minHeight='0';}
  }catch(e){}
}
function resizeAllFrames(){
  document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();
}
function setupFrame(f){
  var tries=0;
  function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete')tick();
  else f.addEventListener('load',tick);
}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;
window.addEventListener('resize',function(){
  clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

// 錨點點擊防錯跳
document.addEventListener('click',function(e){
  var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;var h=a.getAttribute('href');
  if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var el=document.getElementById(h.substring(1));
  if(!el)return;
  e.preventDefault();resizeAllFrames();
  setTimeout(function(){
    resizeAllFrames();
    var rect=el.getBoundingClientRect();
    window.scrollTo({top:window.scrollY+rect.top-20,behavior:'smooth'});
  },60);
},true);

var _rt=0,_riv=setInterval(function(){
  _rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

// 進度條
var rpFill=document.getElementById('rpFill');
var rpPct=document.getElementById('rpPct');
function updateProgress(){
  var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';
  if(rpPct)rpPct.textContent=Math.round(pct)+'%';
}
window.addEventListener('scroll',updateProgress,{passive:true});
updateProgress();

// 接近頁尾淡出
(function(){
  var cap=document.getElementById('readProgress');
  if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var f=document.querySelector('.site-footer');
  if(!f)return;
  if('IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){
      setHide(es.some(function(e){return e.isIntersecting;}));
    },{root:null,rootMargin:'0px 0px -20px 0px',threshold:0.01});
    io.observe(f);
  }else{
    window.addEventListener('scroll',function(){
      var dh=document.documentElement.scrollHeight;
      setHide(dh-(window.scrollY+window.innerHeight)<240);
    },{passive:true});
  }
})();

// 側欄高亮 + backTop
var backTop=document.getElementById('backTop');
if(backTop)backTop.addEventListener('click',function(){
  window.scrollTo({top:0,behavior:'smooth'});});
window.addEventListener('scroll',function(){
  if(backTop)backTop.classList.toggle('show',window.scrollY>600);
  var chs=document.querySelectorAll('.chapter');
  var act=-1;
  chs.forEach(function(c,i){
    if(c.getBoundingClientRect().top<window.innerHeight*0.35)act=i;
  });
  document.querySelectorAll('.sb-item').forEach(function(it,i){
    it.classList.toggle('active',i===act);
  });
},{passive:true});
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-40-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
