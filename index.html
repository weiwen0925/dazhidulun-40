<style>

--border:#d4c4a8;--card:#fffdf7;--sbW:92px;--sbBg:#1e1a14;--sbText:#d4c4a8;

html,body{scrollbar-width:none;-ms-overflow-style:none;}

.sb-brand{position:sticky;top:0;width:100%;font-family:"Noto Sans TC",sans-serif;text-align:center;

.sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;color:var(--gold);}
.sb-brand-line2{display:block;font-size:14px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;color:var(--gold);}
.sb-nav{display:flex;flex-direction:column;gap:4px;width:100%;align-items:center;margin-top:4px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 3px;width:100%;
text-decoration:none;color:var(--sbText);border-radius:8px;transition:background .2s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.18);}
.sb-item.active{background:rgba(184,134,11,.9);box-shadow:0 0 14px rgba(184,134,11,.55);}
.sb-item.active .sb-circle{background:#fff;color:var(--sbBg);border-color:#fff;}
.sb-item.active .sb-label{color:#fff;}
.sb-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);
display:flex;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;
font-size:16px;font-weight:600;color:var(--goldL);}
.sb-label{font-size:11.5px;font-family:"Noto Sans TC",sans-serif;letter-spacing:.3px;opacity:.88;text-align:center;}
#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:130;width:42px;height:42px;border-radius:8px;
border:1px solid var(--border);background:var(--sbBg);color:var(--goldL);font-size:20px;cursor:pointer;}
/* main */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;background:var(--headGrad);color:#f7edd2;text-align:center;
padding:80px 24px 70px;overflow:hidden;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
font-size:280px;color:rgba(212,168,75,.04);font-weight:900;pointer-events:none;white-space:nowrap;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:8px;margin:0 0 18px;color:var(--goldL);position:relative;}
.hero-subtitle{font-size:19px;color:#e4d4b0;max-width:760px;margin:0 auto 14px;line-height:1.9;position:relative;}
.hero-range{font-size:15px;color:#c4b08a;letter-spacing:2px;position:relative;}
/* preface */
.preface{max-width:880px;margin:46px auto 0;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);letter-spacing:8px;margin:0 0 24px;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin:0 0 18px;text-indent:2em;}
/* toc */
.toc-section{max-width:1100px;margin:54px auto 0;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);letter-spacing:10px;margin:0 0 8px;}
.toc-desc{text-align:center;font-size:16px;color:var(--text-muted);letter-spacing:2px;margin:0 0 30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.toc-card{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);

.toc-num{flex:none;width:46px;height:46px;border-radius:50%;background:var(--gold);color:#fff;

.toc-name{font-size:19.5px;line-height:1.6;font-weight:600;}
.toc-sub{display:block;font-size:14.5px;color:var(--text-muted);margin-top:4px;font-weight:400;line-height:1.5;}

.chapter{max-width:1000px;margin:60px auto 0;padding:0 24px;}
.ch-head{background:var(--headGrad);color:#f7edd2;text-align:center;border-radius:14px;padding:40px 26px;position:relative;}
.ch-num{font-size:18px;color:var(--goldL);letter-spacing:3px;font-family:"Noto Sans TC",sans-serif;margin-bottom:12px;}

.ch-head::after{content:"";display:block;width:80px;height:3px;background:var(--gold);margin:20px auto 0;border-radius:2px;}
.ch-body{padding:30px 0 0;}
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);border-left:5px solid var(--gold);

.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin-top:30px;margin-bottom:14px;}

.next-link:hover{color:var(--gold);}

#sb{transform:translateX(-100%);transition:transform .3s;}#sb.open{transform:none;}

.toc-grid{grid-template-columns:1fr;}}

<button aria-label="回到頂部" id="backTop">↑</button>
<script>
var sbBrand=document.getElementById('sbBrand');
if(sbBrand){sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});}
var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
if(sbToggle){sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});}
var backTop=document.getElementById('backTop');
function resizeFrame(f){try{var d=f.contentDocument||f.contentWindow.document;if(!d||!d.body)return;
d.body.style.minHeight='0';d.body.style.height='auto';
if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
var h=d.body.scrollHeight;if(h>100){f.style.height=h+'px';f.style.minHeight='0';}}catch(e){}}
function resizeAllFrames(){document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);if(typeof updateProgress==='function')updateProgress();}
function setupFrame(f){var tries=0;function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
if(f.contentDocument&&f.contentDocument.readyState==='complete'){tick();}else{f.addEventListener('load',tick);}}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});
document.addEventListener('click',function(e){var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
var id=h.substring(1);var el=document.getElementById(id);if(!el)return;e.preventDefault();
resizeAllFrames();setTimeout(function(){resizeAllFrames();var rect=el.getBoundingClientRect();
var y=window.scrollY+rect.top-20;window.scrollTo({top:y,behavior:'smooth'});if(sb)sb.classList.remove('open');},60);},true);
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){var sh=document.documentElement.scrollHeight-window.innerHeight;
var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
if(rpFill)rpFill.style.width=pct+'%';if(rpPct)rpPct.textContent=Math.round(pct)+'%';
if(backTop){if(window.scrollY>600)backTop.classList.add('show');else backTop.classList.remove('show');}}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();
if(backTop)backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
var items=document.querySelectorAll('.sb-item'),chaps=document.querySelectorAll('.chapter');
function highlight(){var idx=-1;chaps.forEach(function(c,i){if(c.getBoundingClientRect().top<window.innerHeight*0.35)idx=i;});
items.forEach(function(it,i){it.classList.toggle('active',i===idx);});}
window.addEventListener('scroll',highlight,{passive:true});highlight();
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
var t=document.querySelector('.site-footer');if(!t)return;
if('IntersectionObserver' in window){var io=new IntersectionObserver(function(es){setHide(es.some(function(e){return e.isIntersecting;}));},{rootMargin:'0px 0px -20px 0px',threshold:0.01});io.observe(t);}
else{window.addEventListener('scroll',function(){var dh=document.documentElement.scrollHeight;var sb2=window.scrollY+window.innerHeight;setHide(dh-sb2<240);},{passive:true});}})();
(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();
</script>
<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy40dzdl-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
